<!DOCTYPE html>

   <link rel="stylesheet" href="css/styles.css">
  <style>
    #gallery {
      width: 450px;
      height:500px;
      margin: 50px auto;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 15px #555;
    }
    #gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      transition: opacity 1s ease-in-out;
    }
    #gallery img.active {
      opacity: 1;
    }
  </style>

 </head>
   <body style="background-color:rgb(180, 180, 180);">

<!-- Header Section -->

            <li><a href="html/facilities.html">Facilities</a></li>
            <li><a href="html/contact.html">Contact Us</a></li>
        </ul>
    </nav>
  </header>

 <main>
    <h2 style="text-align:center;">WELCOME TO REVANA</h2>

    <div id="gallery">
      <img src="images/image 4.jpg" class="active" alt="Hotel Exterior">
      <img src="images/image 3.jpg" alt="Hotel Pool">
      <img src="images/image 1.jpg"  alt="Hotel Lobby">
    </div>

  <script>
    const images = document.querySelectorAll("#gallery img");
    let index = 0;

    setInterval(() => {
      images[index].classList.remove("active");
      index = (index + 1) % images.length;
      images[index].classList.add("active");
    }, 3000); // 3 seconds
  </script>
